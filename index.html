<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NiccoGPT</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --card: #131320;
    --accent: #ff5f1f;
    --accent2: #ffd600;
    --text: #e8e8e8;
    --muted: #6a6a80;
    --radius: 16px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .grain {
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .glow {
    position: fixed;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,95,31,0.08) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 90%;
    max-width: 520px;
    text-align: center;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2.4rem, 7vw, 3.6rem);
    letter-spacing: -2px;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: fadeDown 0.6s ease-out;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 40px;
    animation: fadeDown 0.6s ease-out 0.1s both;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 20px;
    animation: fadeDown 0.6s ease-out 0.2s both;
  }

  input {
    width: 100%;
    padding: 18px 24px;
    padding-right: 60px;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255,95,31,0.15);
  }

  input::placeholder { color: var(--muted); }

  button {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 42px;
    height: 42px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 1.3rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.15s;
  }

  button:hover { background: #ff7a3d; }
  button:active { transform: translateY(-50%) scale(0.92); }

  .response-area {
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeDown 0.6s ease-out 0.3s both;
  }

  .answer {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    letter-spacing: -2px;
    opacity: 0;
    transform: scale(0.7);
    transition: opacity 0.35s, transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .answer.visible {
    opacity: 1;
    transform: scale(1);
  }

  .answer.golf { color: #34d399; }
  .answer.drums { color: #818cf8; }
  .answer.both { 
    background: linear-gradient(135deg, #34d399, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tokens {
    color: var(--muted);
    font-size: 0.7rem;
    margin-top: 8px;
    opacity: 0;
    transition: opacity 0.4s;
  }

  .tokens.visible { opacity: 1; }

  .thinking {
    color: var(--muted);
    font-size: 1.1rem;
  }

  .thinking .dots::after {
    content: '';
    animation: dots 1.2s steps(4, end) infinite;
  }

  .history {
    margin-top: 32px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 180px;
    overflow-y: auto;
    animation: fadeDown 0.6s ease-out 0.4s both;
  }

  .history-item {
    font-size: 0.75rem;
    color: var(--muted);
    padding: 6px 12px;
    background: rgba(255,255,255,0.02);
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
  }

  .history-item .q { 
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 65%;
    text-align: left;
  }

  .history-item .a { font-weight: 700; }
  .history-item .a.golf { color: #34d399; }
  .history-item .a.drums { color: #818cf8; }
  .history-item .a.both { color: var(--accent2); }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }
</style>
</head>
<body>
  <div class="grain"></div>
  <div class="glow"></div>

  <div class="container">
    <h1>NiccoGPT</h1>
    <p class="subtitle">the world's most advanced AI</p>

    <div class="input-wrap">
      <input type="text" id="question" placeholder="Ask me anything..." autofocus>
      <button id="ask" aria-label="Ask">&#x2192;</button>
    </div>

    <div class="response-area">
      <div id="output"></div>
    </div>

    <div class="history" id="history"></div>
  </div>

<script>
  const input = document.getElementById('question');
  const btn = document.getElementById('ask');
  const output = document.getElementById('output');
  const history = document.getElementById('history');

  function ask() {
    const q = input.value.trim();
    if (!q) return;
    input.value = '';
    btn.disabled = true;

    output.innerHTML = '<div class="thinking">Thinking<span class="dots"></span></div>';

    const delay = Math.random() * 4900 + 100;

    setTimeout(() => {
      const roll = Math.random();
      let result, cls;
      if (roll < 0.475) { result = 'Golf'; cls = 'golf'; }
      else if (roll < 0.95) { result = 'Drums'; cls = 'drums'; }
      else { result = 'Golf & Drums'; cls = 'both'; }

      output.innerHTML = `<div class="answer ${cls}">${result}</div><div class="tokens" id="tkn"></div>`;
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          output.querySelector('.answer').classList.add('visible');
          const tkn = document.getElementById('tkn');
          const absurd = Math.floor(Math.random() * 9_999_999_999) + 1_000_000;
          tkn.textContent = `${absurd.toLocaleString()} tokens used`;
          tkn.classList.add('visible');
        });
      });

      const item = document.createElement('div');
      item.className = 'history-item';
      item.innerHTML = `<span class="q">${q}</span><span class="a ${cls}">${result}</span>`;
      history.prepend(item);

      btn.disabled = false;
      input.focus();
    }, delay);
  }

  btn.addEventListener('click', ask);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') ask(); });
</script>
</body>
</html>
